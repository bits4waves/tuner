<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Web Tuner</title>
  <style>
    body {
      background: #111;
      color: #eee;
      font-family: sans-serif;
      text-align: center;
    }
    #noteDisplay {
      font-size: 3em;
      margin: 10px 0;
    }
    #pitchDisplay {
      font-size: 1.5em;
      margin: 5px 0 20px;
    }
    canvas {
      display: block;
      margin: 10px auto;
      background: #222;
    }
    #centsCanvas {
      width: 600px;
      height: 200px;
    }
    #oscilloscope {
      width: 600px;
      height: 100px;
      display: none; /* hidden initially */
    }
    #controls {
      margin: 20px;
      font-size: 1em;
    }
    label {
      cursor: pointer;
      display: inline-block;
      margin: 0 10px;
    }
  </style>
</head>
<body>
  <h1>Web Tuner</h1>
  <div id="noteDisplay">--</div>
  <div id="pitchDisplay">-- Hz</div>

  <canvas id="centsCanvas" width="600" height="200"></canvas>
  <canvas id="oscilloscope" width="600" height="100"></canvas>

  <div id="controls">
    <label>
      <input type="checkbox" id="toggleCentsText"> Show difference in cents (text)
    </label>
    <label>
      <input type="checkbox" id="toggleCentsGraph" checked> Show difference in cents (graph)
    </label>
    <label>
      <input type="checkbox" id="toggleWaveform"> Show waveform
    </label>
  </div>

  <script>
    // === Audio setup ===
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    const bufferLength = analyser.fftSize;
    const dataArray = new Float32Array(bufferLength);

    const oscilloscope = document.getElementById("oscilloscope");
    const oCtx = oscilloscope.getContext("2d");

    const centsCanvas = document.getElementById("centsCanvas");
    const cCtx = centsCanvas.getContext("2d");

    const pitchDisplay = document.getElementById("pitchDisplay");
    const noteDisplay = document.getElementById("noteDisplay");

    const toggleCentsText = document.getElementById("toggleCentsText");
    const toggleCentsGraph = document.getElementById("toggleCentsGraph");
    const toggleWaveform = document.getElementById("toggleWaveform");

    toggleWaveform.addEventListener("change", () => {
      oscilloscope.style.display = toggleWaveform.checked ? "block" : "none";
    });

    navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
      const source = audioCtx.createMediaStreamSource(stream);
      source.connect(analyser);
      drawWaveform();
      setInterval(updatePitchAndNote, 100); // update every 100ms
    });

    // === Oscilloscope waveform ===
    function drawWaveform() {
      requestAnimationFrame(drawWaveform);
      analyser.getFloatTimeDomainData(dataArray);

      oCtx.fillStyle = "#222";
      oCtx.fillRect(0, 0, oscilloscope.width, oscilloscope.height);

      oCtx.lineWidth = 2;
      oCtx.strokeStyle = "#0f0";
      oCtx.beginPath();

      const sliceWidth = oscilloscope.width / bufferLength;
      let x = 0;

      for (let i = 0; i < bufferLength; i++) {
        const v = dataArray[i] * 0.5 + 0.5;
        const y = v * oscilloscope.height;
        if (i === 0) oCtx.moveTo(x, y);
        else oCtx.lineTo(x, y);
        x += sliceWidth;
      }

      oCtx.stroke();
    }

    // === Yin pitch detection ===
    function yinPitch(float32AudioBuffer, sampleRate) {
      const threshold = 0.1;
      const bufferSize = float32AudioBuffer.length;
      const yinBuffer = new Float32Array(bufferSize / 2);
      let tau, delta, runningSum, j;
      for (tau = 1; tau < yinBuffer.length; tau++) {
        runningSum = 0;
        for (j = 0; j < yinBuffer.length; j++) {
          delta = float32AudioBuffer[j] - float32AudioBuffer[j + tau];
          runningSum += delta * delta;
        }
        yinBuffer[tau] = runningSum;
      }
      runningSum = 0;
      yinBuffer[0] = 1;
      for (tau = 1; tau < yinBuffer.length; tau++) {
        runningSum += yinBuffer[tau];
        yinBuffer[tau] *= tau / runningSum;
      }
      let tauEstimate = -1;
      for (tau = 2; tau < yinBuffer.length; tau++) {
        if (yinBuffer[tau] < threshold) {
          while (tau + 1 < yinBuffer.length && yinBuffer[tau + 1] < yinBuffer[tau]) tau++;
          tauEstimate = tau;
          break;
        }
      }
      if (tauEstimate === -1) return null;
      let betterTau, x0, x1, x2;
      if (tauEstimate > 0 && tauEstimate < yinBuffer.length - 1) {
        x0 = yinBuffer[tauEstimate - 1];
        x1 = yinBuffer[tauEstimate];
        x2 = yinBuffer[tauEstimate + 1];
        betterTau = tauEstimate + (x2 - x0) / (2 * (2 * x1 - x2 - x0));
      } else betterTau = tauEstimate;
      return sampleRate / betterTau;
    }

    // === Note + cents calculation ===
    function frequencyToNoteWithCents(frequency) {
      const A4 = 440;
      const noteNumber = 12 * (Math.log2(frequency / A4)) + 69;
      const nearestNote = Math.round(noteNumber);
      const noteNames = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
      const noteName = noteNames[(nearestNote % 12 + 12) % 12];
      const octave = Math.floor(nearestNote / 12) - 1;
      const noteWithOctave = noteName + octave;
      const noteFreq = A4 * Math.pow(2, (nearestNote - 69) / 12);
      const cents = 1200 * Math.log2(frequency / noteFreq);
      return { noteWithOctave, cents };
    }

    function updatePitchAndNote() {
      analyser.getFloatTimeDomainData(dataArray);
      const sampleRate = audioCtx.sampleRate;
      const pitch = yinPitch(dataArray, sampleRate);

      if (pitch) {
        pitchDisplay.textContent = pitch.toFixed(2) + ' Hz';
        const { noteWithOctave, cents } = frequencyToNoteWithCents(pitch);

        noteDisplay.textContent = toggleCentsText.checked
          ? `${noteWithOctave} (${cents.toFixed(2)} cents)`
          : noteWithOctave;

        drawCentsIndicator(toggleCentsGraph.checked ? cents : null);
      } else {
        pitchDisplay.textContent = '-- Hz';
        noteDisplay.textContent = '--';
        drawCentsIndicator(null);
      }
    }

    // === Cents graph ===
    function drawCentsIndicator(cents) {
      if (!toggleCentsGraph.checked) {
        centsCanvas.style.display = "none";
        return;
      } else {
        centsCanvas.style.display = "block";
      }

      const w = centsCanvas.width;
      const h = centsCanvas.height;
      cCtx.clearRect(0, 0, w, h);

      // Background bands
      function drawBand(limitCents, color) {
        const x1 = w/2 + (-limitCents / 50) * (w/2);
        const x2 = w/2 + (limitCents / 50) * (w/2);
        cCtx.fillStyle = color;
        cCtx.fillRect(x1, 0, x2 - x1, h);
      }
      drawBand(50, "#331111"); // red
      drawBand(15, "#333311"); // yellow
      drawBand(5, "#113311");  // green

      // Center line
      cCtx.strokeStyle = "#888";
      cCtx.beginPath();
      cCtx.moveTo(w/2, 0);
      cCtx.lineTo(w/2, h);
      cCtx.stroke();

      // Tick marks at band edges
      const tickPositions = [-50, -15, -5, 0, 5, 15, 50];
      tickPositions.forEach(cent => {
        const xTick = w/2 + (cent / 50) * (w/2);
        // Keep text inside canvas
        const labelOffset = 12;
        const x = Math.min(Math.max(xTick, labelOffset), w - labelOffset);

        // Tick line
        cCtx.strokeStyle = "#aaa";
        cCtx.beginPath();
        cCtx.moveTo(xTick, h - 10);
        cCtx.lineTo(xTick, h);
        cCtx.stroke();

        // Tick label color
        let color;
        if (Math.abs(cent) <= 5) color = "#0f0";
        else if (Math.abs(cent) <= 15) color = "#ff0";
        else color = "#f00";

        cCtx.fillStyle = color;
        cCtx.font = "12px sans-serif";
        cCtx.fillText(cent > 0 ? `+${cent}c` : `${cent}c`, x - labelOffset, h - 15);
      });

      // Needle
      if (cents === null) return;
      const clamped = Math.max(-50, Math.min(50, cents));
      const xNeedle = w/2 + (clamped / 50) * (w/2);
      cCtx.strokeStyle = "red";
      cCtx.lineWidth = 3;
      cCtx.beginPath();
      cCtx.moveTo(xNeedle, 0);
      cCtx.lineTo(xNeedle, h);
      cCtx.stroke();
    }
  </script>
</body>
</html>
