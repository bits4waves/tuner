<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tuner</title>
<style>
  body { background:black; color:white; font-family:sans-serif; }
  canvas { display:block; margin:10px 0; background:#111; }
  label { display:block; margin-top:10px; }
</style>
</head>
<body>

<h1>Microphone Tuner</h1>

<!-- Display elements -->
<div>
  <span id="noteName">--</span>
  <span id="centsText">(0¢)</span>
</div>

<!-- Checkboxes -->
<label><input type="checkbox" id="showWaveform" checked> Show Waveform</label>
<label><input type="checkbox" id="showCentsText" checked> Show Cents Text</label>
<label><input type="checkbox" id="showCentsGraph" checked> Show Cents Graph</label>

<!-- Canvases -->
<canvas id="centsCanvas" width="500" height="50"></canvas>
<canvas id="waveformCanvas" width="500" height="100"></canvas>

<!-- Sliders -->
<label>Pitch Smoothing: <span id="pitchAlphaValue">0.3</span></label>
<input type="range" id="pitchAlphaSlider" min="0.1" max="1" step="0.05" value="0.3">

<label>Cents Smoothing: <span id="centsAlphaValue">0.3</span></label>
<input type="range" id="centsAlphaSlider" min="0.1" max="1" step="0.05" value="0.3">

<script>
// ---- Canvas setup ----
const waveCanvas = document.getElementById('waveformCanvas');
const waveCtx = waveCanvas.getContext('2d');
const centsCanvas = document.getElementById('centsCanvas');
const centsCtx = centsCanvas.getContext('2d');

const noteElem = document.getElementById('noteName');
const centsText = document.getElementById('centsText');

const showWaveform = document.getElementById('showWaveform');
const showCentsText = document.getElementById('showCentsText');
const showCentsGraph = document.getElementById('showCentsGraph');

// ---- EMA variables ----
let pitchAlpha = parseFloat(document.getElementById("pitchAlphaSlider").value);
let centsAlpha = parseFloat(document.getElementById("centsAlphaSlider").value);
let smoothedPitch = 0;
let smoothedCents = 0;

// ---- Note names ----
const noteStrings = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

// ---- Slider events ----
document.getElementById("pitchAlphaSlider").addEventListener("input", e => {
  pitchAlpha = parseFloat(e.target.value);
  document.getElementById("pitchAlphaValue").textContent = pitchAlpha.toFixed(2);
});
document.getElementById("centsAlphaSlider").addEventListener("input", e => {
  centsAlpha = parseFloat(e.target.value);
  document.getElementById("centsAlphaValue").textContent = centsAlpha.toFixed(2);
});

// ---- Yin pitch detection (with sub-sample interpolation) ----
function yinDetector(buf, sampleRate) {
  const threshold = 0.1;
  const maxLag = Math.floor(buf.length/2);
  const yinBuffer = new Float32Array(maxLag);
  let minTau = -1;

  for (let tau=1; tau<maxLag; tau++){
    let sum=0;
    for (let i=0; i<maxLag; i++){
      const delta = buf[i]-buf[i+tau];
      sum += delta*delta;
    }
    yinBuffer[tau]=sum;
  }
  yinBuffer[0]=1;

  let runningSum=0;
  for (let tau=1; tau<maxLag; tau++){
    runningSum += yinBuffer[tau];
    yinBuffer[tau] *= tau/runningSum;
  }

  for (let tau=2; tau<maxLag; tau++){
    if(yinBuffer[tau]<threshold){
      while(tau+1<maxLag && yinBuffer[tau+1]<yinBuffer[tau]) tau++;
      minTau = tau;
      break;
    }
  }
  if(minTau==-1) return -1;

  if(minTau>0 && minTau<maxLag-1){
    const y0=yinBuffer[minTau-1], y1=yinBuffer[minTau], y2=yinBuffer[minTau+1];
    const delta = (y0 - y2)/(2*(y0 - 2*y1 + y2));
    return sampleRate/(minTau + delta);
  }
  return sampleRate/minTau;
}

// ---- Note / cents conversion ----
function noteFromPitch(f) { return Math.round(12*Math.log2(f/440))+69; }
function centsOffFromPitch(f,note){ return 1200*Math.log2(f/(440*Math.pow(2,(note-69)/12))); }

// ---- Draw waveform ----
function drawWaveform(data){
  if(!showWaveform.checked) return;
  const w=waveCanvas.width, h=waveCanvas.height;
  waveCtx.clearRect(0,0,w,h);
  waveCtx.strokeStyle="#fff"; waveCtx.beginPath();
  for(let i=0;i<data.length;i++){
    const y=(0.5-data[i]/2)*h;
    const x=i*w/data.length;
    if(i===0) waveCtx.moveTo(x,y); else waveCtx.lineTo(x,y);
  }
  waveCtx.stroke();
}

// ---- Draw cents graph ----
function drawCents(cents){
  if(!showCentsGraph.checked) return;
  const w=centsCanvas.width, h=centsCanvas.height;
  centsCtx.clearRect(0,0,w,h);

  const centerBand=5, nearBand=25, scale=w/2/50;
  const leftFar=0, leftNear=w/2-nearBand*scale, centerLeft=w/2-centerBand*scale;
  const centerRight=w/2+centerBand*scale, rightNear=w/2+nearBand*scale, rightFar=w;

  // Highlight band
  let highlightXStart, highlightWidth;
  if(cents>=-centerBand && cents<=centerBand){highlightXStart=centerLeft;highlightWidth=centerRight-centerLeft;}
  else if(cents>centerBand && cents<=nearBand){highlightXStart=centerRight;highlightWidth=rightNear-centerRight;}
  else if(cents<-centerBand && cents>=-nearBand){highlightXStart=leftNear;highlightWidth=centerLeft-leftNear;}
  else if(cents>nearBand){highlightXStart=rightNear;highlightWidth=rightFar-rightNear;}
  else {highlightXStart=leftFar;highlightWidth=leftNear-leftFar;}

  // Draw bands
  centsCtx.fillStyle="#444"; centsCtx.fillRect(leftFar,0,leftNear-leftFar,h); centsCtx.fillRect(rightNear,0,rightFar-rightNear,h);
  centsCtx.fillStyle="#666"; centsCtx.fillRect(leftNear,0,centerLeft-leftNear,h); centsCtx.fillRect(centerRight,0,rightNear-centerRight,h);
  centsCtx.fillStyle="#888"; centsCtx.fillRect(centerLeft,0,centerRight-centerLeft,h);

  // Highlight
  centsCtx.fillStyle="#fff"; centsCtx.globalAlpha=0.2;
  centsCtx.fillRect(highlightXStart,0,highlightWidth,h); centsCtx.globalAlpha=1.0;

  // Center line
  centsCtx.strokeStyle="#aaa"; centsCtx.beginPath(); centsCtx.moveTo(w/2,0); centsCtx.lineTo(w/2,h); centsCtx.stroke();

  // Labels
  centsCtx.fillStyle="#fff"; centsCtx.fillText("-50¢",5,15);
  centsCtx.fillText("0¢",w/2-10,15);
  centsCtx.fillText("+50¢",w-35,15);

  // Vertical needle
  const x=w/2+cents*scale;
  centsCtx.strokeStyle="#fff"; centsCtx.beginPath(); centsCtx.moveTo(x,0); centsCtx.lineTo(x,h); centsCtx.stroke();
}

// ---- Update pitch display ----
function updatePitchDisplay(detectedPitch){
  if(detectedPitch<=0) return;

  smoothedPitch = pitchAlpha*detectedPitch + (1-pitchAlpha)*smoothedPitch;

  const note = noteFromPitch(smoothedPitch);
  const rawCents = centsOffFromPitch(smoothedPitch,note);

  smoothedCents = centsAlpha*rawCents + (1-centsAlpha)*smoothedCents;

  noteElem.textContent = `${noteStrings[note%12]}${Math.floor(note/12)-1}`;
  if(showCentsText.checked) centsText.textContent = `(${smoothedCents.toFixed(1)}¢)`;
  else centsText.textContent = '';
  drawCents(smoothedCents);
}

// ---- Microphone setup ----
navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
  const audioCtx = new AudioContext();
  const source = audioCtx.createMediaStreamSource(stream);
  const processor = audioCtx.createScriptProcessor(2048,1,1);

  source.connect(processor);
  processor.connect(audioCtx.destination);

  processor.onaudioprocess = e => {
    const buf = e.inputBuffer.getChannelData(0);
    drawWaveform(buf);
    const pitch = yinDetector(buf,audioCtx.sampleRate);
    updatePitchDisplay(pitch);
  };
}).catch(err=>console.log("Microphone error:",err));

</script>

</body>
</html>
