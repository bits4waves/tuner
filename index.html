<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tuner</title>
<style>
  body { font-family: sans-serif; text-align: center; background: #111; color: #eee; }
  canvas { background: #000; display: block; margin: 10px auto; }
  label { display: block; margin: 5px; }
  #controls { margin-top: 20px; }

  /* LED indicator */
  #mode-indicator { margin: 10px 0; font-size: 14px; display: flex; align-items: center; justify-content:center;}
  .led {
    display: inline-block;
    width: 14px;
    height: 14px;
    margin-right: 6px;
    border-radius: 50%;
    background-color: #222;
    box-shadow: inset -1px -1px 3px rgba(0,0,0,0.8),
                inset 1px 1px 3px rgba(255,255,255,0.1);
    position: relative;
    transition: background-color 0.3s ease, box-shadow 0.3s ease;
  }
  .led.on {
    background-color: red;
    box-shadow: 0 0 8px rgba(255,0,0,0.8),
                0 0 14px rgba(255,0,0,0.6),
                inset -1px -1px 3px rgba(0,0,0,0.6),
                inset 1px 1px 4px rgba(255,255,255,0.5);
    transition: background-color 0.6s ease, box-shadow 0.6s ease;
  }
  .led::after {
    content: "";
    position: absolute;
    top: 2px;
    left: 2px;
    width: 60%;
    height: 40%;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    filter: blur(1px);
    pointer-events: none;
  }
  .label { user-select: none; }

  /* Sliders layout */
  #oscilloscopeControls { text-align:left; width:600px; margin:10px auto; }
</style>
</head>
<body>
<h1>Tuner</h1>

<div id="pitchInfo">
  <h2><span id="noteName">--</span> <span id="centsText">(0¢)</span></h2>
</div>

<canvas id="centsCanvas" width="600" height="100"></canvas>
<canvas id="oscilloscope" width="600" height="100" style="display:none;"></canvas>

<!-- LED indicator -->
<div id="mode-indicator">
  <span class="led" id="autoLed"></span>
  <span class="label">Auto</span>
</div>

<div id="controls">
  <label><input type="checkbox" id="toggleCents" checked> Show cents graph</label>
  <label><input type="checkbox" id="toggleOscilloscope"> Show oscilloscope</label>

  <div id="oscilloscopeControls" style="display:none;">
    <label><input type="checkbox" id="manualToggle"> Manual cycles mode</label>
    <label>Cycles to display: <input type="range" id="cycleSlider" min="1" max="10" step="1" value="5"> <span id="cycleValue">5</span></label>
    <label>Cycles to average: <input type="range" id="averageSlider" min="1" max="10" step="1" value="3"> <span id="averageValue">3</span></label>
  </div>
</div>

<script>
/* --- Helper functions for notes and cents --- */
const noteStrings = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
function noteFromPitch(freq) { return Math.round(12 * (Math.log2(freq / 440)) + 57); }
function frequencyFromNoteNumber(note) { return 440 * Math.pow(2, (note - 57) / 12); }
function centsOffFromPitch(freq, note) { return 1200 * Math.log2(freq / frequencyFromNoteNumber(note)); }

/* --- DOM elements --- */
const noteElem = document.getElementById("noteName");
const centsText = document.getElementById("centsText");
const centsCanvas = document.getElementById("centsCanvas");
const cCtx = centsCanvas.getContext("2d");

const oscilloscope = document.getElementById("oscilloscope");
const oCtx = oscilloscope.getContext("2d");

const toggleCents = document.getElementById("toggleCents");
const toggleOscilloscope = document.getElementById("toggleOscilloscope");
const oscilloscopeControls = document.getElementById("oscilloscopeControls");
const manualToggle = document.getElementById("manualToggle");
const cycleSlider = document.getElementById("cycleSlider");
const cycleValue = document.getElementById("cycleValue");
const averageSlider = document.getElementById("averageSlider");
const averageValue = document.getElementById("averageValue");
const autoLed = document.getElementById("autoLed");

let cyclesToDisplay = parseInt(cycleSlider.value);
let cyclesToAverage = parseInt(averageSlider.value);

/* --- LED Indicator --- */
function updateModeIndicator() {
  if (manualToggle.checked) autoLed.classList.remove("on");
  else autoLed.classList.add("on");
}
updateModeIndicator();
manualToggle.addEventListener("change", updateModeIndicator);

/* --- Sliders --- */
cycleSlider.addEventListener("input", () => {
  if (!manualToggle.checked) manualToggle.checked = true;
  cyclesToDisplay = parseInt(cycleSlider.value);
  cycleValue.textContent = cyclesToDisplay;
  updateModeIndicator();
});
averageSlider.addEventListener("input", () => {
  if (!manualToggle.checked) manualToggle.checked = true;
  cyclesToAverage = parseInt(averageSlider.value);
  averageValue.textContent = cyclesToAverage;
  updateModeIndicator();
});

/* --- Toggles --- */
toggleCents.addEventListener("change", () => { centsCanvas.style.display = toggleCents.checked ? "block" : "none"; });
toggleOscilloscope.addEventListener("change", () => {
  oscilloscope.style.display = toggleOscilloscope.checked ? "block" : "none";
  oscilloscopeControls.style.display = toggleOscilloscope.checked ? "block" : "none";
});

/* --- Cents graph --- */
function drawCents(cents) {
  cCtx.clearRect(0,0,centsCanvas.width,centsCanvas.height);
  const w = centsCanvas.width, h = centsCanvas.height;

  // Define band widths
  const centerBand = 5; // ±5¢
  const nearBand = 25;  // ±25¢
  const scale = w/2/50; // pixels per cent

  // Draw far bands (±25 to 50)
  cCtx.fillStyle = "#444"; // light gray
  cCtx.fillRect(0,0,(w/2 - nearBand*scale),h); // left far
  cCtx.fillRect(w/2 + nearBand*scale,0,w/2 - nearBand*scale,h); // right far

  // Draw near bands (±5 to 25)
  cCtx.fillStyle = "#666"; // medium gray
  cCtx.fillRect(w/2 - nearBand*scale,0, (nearBand-centerBand)*scale, h); // left near
  cCtx.fillRect(w/2 + centerBand*scale,0, (nearBand-centerBand)*scale, h); // right near

  // Draw center band (±5¢)
  cCtx.fillStyle = "#888"; // dark gray
  cCtx.fillRect(w/2 - centerBand*scale,0, 2*centerBand*scale, h);

  // Center line
  cCtx.strokeStyle="#aaa";
  cCtx.beginPath();
  cCtx.moveTo(w/2,0); cCtx.lineTo(w/2,h); cCtx.stroke();

  // Extremities labels
  cCtx.fillStyle="#fff";
  cCtx.fillText("-50¢",5,15);
  cCtx.fillText("0¢",w/2-10,15);
  cCtx.fillText("+50¢",w-35,15);

  // Dot
  const x = w/2 + cents*scale;
  const y = h/2;
  cCtx.fillStyle="#fff";
  cCtx.beginPath();
  cCtx.arc(x,y,6,0,2*Math.PI);
  cCtx.fill();
}

/* --- Oscilloscope --- */
function drawOscilloscope(buffer,pitchHz,sampleRate){
  oCtx.clearRect(0,0,oscilloscope.width,oscilloscope.height);
  oCtx.beginPath();
  oCtx.strokeStyle="#0f0";
  if (pitchHz<=0) return;
  let displayCycles,averageCycles;
  if (manualToggle.checked){ displayCycles=cyclesToDisplay; averageCycles=cyclesToAverage; }
  else { displayCycles = pitchHz>200?5:3; averageCycles=3; }
  const samplesPerCycle = sampleRate/pitchHz;
  const totalSamples = buffer.length;
  averageCycles = Math.min(averageCycles, Math.floor(totalSamples/samplesPerCycle));
  displayCycles = Math.min(displayCycles,averageCycles);
  const averaged = new Float32Array(Math.floor(samplesPerCycle));
  for(let c=0;c<averageCycles;c++){
    const offset = totalSamples - Math.floor(samplesPerCycle*averageCycles) + c*Math.floor(samplesPerCycle);
    for(let i=0;i<averaged.length;i++) averaged[i] += buffer[offset+i]/averageCycles;
  }
  const samplesToDraw = Math.floor(samplesPerCycle*displayCycles);
  for(let i=0;i<samplesToDraw;i++){
    const idx = i%averaged.length;
    const x = (i/samplesToDraw)*oscilloscope.width;
    const y = (0.5+averaged[idx]/2)*oscilloscope.height;
    i===0?oCtx.moveTo(x,y):oCtx.lineTo(x,y);
  }
  oCtx.stroke();
}

/* --- Microphone and Yin pitch detection --- */
navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
  const audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  const analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  const bufferLength = analyser.fftSize;
  const data = new Float32Array(bufferLength);
  const source = audioCtx.createMediaStreamSource(stream);
  source.connect(analyser);

  function yinDetector(buf,sampleRate){
    const threshold=0.1;
    const maxLag=Math.floor(buf.length/2);
    const yinBuffer = new Float32Array(maxLag);
    let minTau=-1;
    for(let tau=1;tau<maxLag;tau++){
      let sum=0;
      for(let i=0;i<maxLag;i++){ const delta = buf[i]-buf[i+tau]; sum+=delta*delta; }
      yinBuffer[tau]=sum;
    }
    yinBuffer[0]=1;
    let runningSum=0;
    for(let tau=1;tau<maxLag;tau++){ runningSum+=yinBuffer[tau]; yinBuffer[tau]*=tau/runningSum; }
    for(let tau=2;tau<maxLag;tau++){
      if(yinBuffer[tau]<threshold){ while(tau+1<maxLag&&yinBuffer[tau+1]<yinBuffer[tau]) tau++; minTau=tau; break; }
    }
    if(minTau===-1) return -1;
    return sampleRate/minTau;
  }

  function update(){
    analyser.getFloatTimeDomainData(data);
    const pitch = yinDetector(data,audioCtx.sampleRate);
    if(pitch>0){
      const note = noteFromPitch(pitch);
      const name = noteStrings[note%12];
      const octave = Math.floor(note/12)-1;
      const cents = centsOffFromPitch(pitch,note);
      noteElem.textContent = `${name}${octave}`;
      centsText.textContent = `(${cents.toFixed(1)}¢)`;
      if(toggleCents.checked) drawCents(cents);
      if(toggleOscilloscope.checked) drawOscilloscope(data,pitch,audioCtx.sampleRate);
    }
    requestAnimationFrame(update);
  }
  update();
});
</script>
</body>
</html>
